<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Formulario de Inscripción</title>
<link rel="stylesheet" href="style1.css"

</head>

<body>

<div class="formulario">

<h2>Formulario de Inscripción</h2>

<form>

<label>Tipo de documento</label>
<select required>
<option value="">Seleccione</option>
<option>Cédula</option>
<option>Tarjeta de Identidad</option>
<option>Pasaporte</option>
</select>

<label>Número de documento</label>
<input type="text" pattern="[0-9]+" title="Solo números" required>

<label>Nombres</label>
<input type="text" minlength="3" maxlength="64" required>

<label>Apellidos</label>
<input type="text" minlength="3" maxlength="64" required>

<label>Dirección</label>
<input type="text" required>

<label>Teléfono fijo</label>
<input type="tel" pattern="[0-9]+" title="Solo números" required>

<label>Teléfono celular</label>
<input type="tel" pattern="[0-9]+" title="Solo números" required>

<label>Correo electrónico</label>
<input type="email" required>

<label>Usuario</label>
<input type="text" pattern="[A-Za-z]{3,14}[0-9]{0,2}" title="3 a 16 caracteres y máximo 2 números al final" required>

<label>Password</label>
<input type="password"
pattern="(?=.*[A-Z])(?=(.*[a-z]){2,})(?=(.*[0-9]){5,})[A-Za-z0-9!?+\-/&$]{16}"
title="Debe tener 16 caracteres, 1 mayúscula, 2 minúsculas, 5 números y símbolos !?-+/&$"
required>

<label>Fecha de inscripción</label>
<input type="date" min="2026-02-15" max="2026-03-06" required>

<label>Hobbies</label>

<div class="hobbies">
<input type="checkbox"> Deporte<br>
<input type="checkbox"> Música<br>
<input type="checkbox"> Lectura<br>
<input type="checkbox"> Videojuegos
</div>

<div class="botones">
<button type="submit">Enviar</button>
<button type="reset">Limpiar</button>
</div>

</form>

</div>

</body>
</html>
